$kind: http-request
name: 'GET /users/:id - Found'
method: GET
url: 'http://localhost:3000/users/1'
order: 2000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has id = 1", function () {
          const json = pm.response.json();
          pm.expect(json.id).to.eql(1);
      });

      pm.test("Response has name (string)", function () {
          const json = pm.response.json();
          pm.expect(json.name).to.be.a('string');
      });

      pm.test("Response has email (string)", function () {
          const json = pm.response.json();
          pm.expect(json.email).to.be.a('string');
      });
